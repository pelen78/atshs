    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 0.6rem 1.25rem; border-radius: 5px; font-size: 0.9rem; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; }
    .btn-primary { background: #E31937; color: white; }
    .btn-primary:hover { background: #c41230; }
    .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
    .btn-secondary { background: #eef1f8; color: #003087; border: 1px solid #d0cec8; }
    #log { background: #1a1a18; color: #a8ff78; border-radius: 6px; padding: 1rem; font-family: monospace; font-size: 0.82rem; height: 300px; overflow-y: auto; margin-top: 1rem; }
    .log-ok { color: #a8ff78; }
    .log-err { color: #ff6b6b; }
    .log-info { color: #74b9ff; }
    .progress-bar { height: 8px; background: #e8e6e0; border-radius: 4px; margin: 1rem 0; overflow: hidden; }
    .progress-fill { height: 100%; background: #003087; border-radius: 4px; transition: width 0.3s; width: 0%; }
    .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 1rem; }
    .stat { background: #eef1f8; border-radius: 6px; padding: 0.75rem 1rem; text-align: center; }
    .stat-num { font-size: 1.5rem; font-weight: 600; color: #003087; }
    .stat-lbl { font-size: 0.72rem; color: #6b6b65; text-transform: uppercase; letter-spacing: 0.05em; }

    <div class="stat"><div class="stat-num" id="uploaded-count" style="color:#2d7a4f">0</div><div class="stat-lbl">Uploaded</div></div>
    <div class="stat"><div class="stat-num" id="error-count" style="color:#c0392b">0</div><div class="stat-lbl">Errors</div></div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;">
    <button class="btn btn-primary" id="migrate-btn" onclick="startMigration()">▶ Upload All Staff to Firebase</button>
    <button class="btn btn-secondary" onclick="clearLog()">Clear Log</button>
  </div>
  <div id="log"></div>
</div>

<div class="card" style="font-size:0.82rem;color:#6b6b65;">

let uploaded = 0;
let errors = 0;

function log(msg, type='info') {
  const el = document.getElementById('log');
  const line = document.createElement('div');
  line.className = 'log-' + type;
  line.textContent = msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

function clearLog() {
  document.getElementById('log').innerHTML = '';
}

function updateStats() {
  document.getElementById('uploaded-count').textContent = uploaded;
  document.getElementById('error-count').textContent = errors;
  const pct = Math.round((uploaded + errors) / STAFF.length * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
}

async function startMigration() {
  const btn = document.getElementById('migrate-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Uploading...';
  uploaded = 0; errors = 0;
  updateStats();

  log('🚀 Starting migration — ' + STAFF.length + ' staff members', 'info');
  log('Connecting to Firebase project: ats-hs-portal', 'info');
  log('─'.repeat(50), 'info');

  for (const staff of STAFF) {
    try {
      const record = {
        ...staff,
        department: '',
        hoursPerWeek: '100%',
        course1: '', course2: '', course3: '', course4: '', course5: '',
        adminW: '', coordCouns: '', advCoAdv: '', headDept: '',
        teacherId: staff.id,
        updatedAt: new Date().toISOString()
      };
      await db.collection('staffing').doc(staff.id).set(record);
      uploaded++;
      log('✓ ' + staff.name + ' ' + staff.lastName + ' (' + staff.id + ')', 'ok');
      updateStats();
      // Small delay to avoid rate limiting
      await new Promise(r => setTimeout(r, 50));
    } catch(e) {
      errors++;
      log('✗ ERROR — ' + staff.name + ' ' + staff.lastName + ': ' + e.message, 'err');
      updateStats();
    }
  }

  log('─'.repeat(50), 'info');
  if (errors === 0) {
    log('✅ Migration complete! All ' + uploaded + ' staff members uploaded successfully.', 'ok');
    btn.textContent = '✅ Done!';
    btn.style.background = '#2d7a4f';
  } else {
    log('⚠ Done with ' + errors + ' errors. Check red lines above.', 'err');
    btn.textContent = '⚠ Done with errors';
    btn.disabled = false;
  }
}
